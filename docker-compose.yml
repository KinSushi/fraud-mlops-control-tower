services:
  api:
    build: .
    container_name: fraud-mlops-api
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      FRAUD_MLOPS_MODEL_PATH: /app/artifacts/model.pkl

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: fraud-mlops-mlflow
    command: >
      mlflow ui
      --backend-store-uri /mlflow/mlruns
      --host 0.0.0.0
      --port 5000
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - mlflow_data:/mlflow

volumes:
  mlflow_data:
