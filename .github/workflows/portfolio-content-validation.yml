name: portfolio-content-validation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/screenshots/**'
      - 'docs/screenshots.md'
      - 'docs/local_run_report.md'

permissions:
  contents: write

jobs:
  validate-and-capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate and generate content previews
        shell: bash
        run: |
          set +e
          REPO="${GITHUB_REPOSITORY#*/}"
          mkdir -p docs/screenshots
          REPORT="docs/local_run_report.md"
          echo "# Local Run Report" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Generated by GitHub Actions on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Step | Status | Exit |" >> "$REPORT"
          echo "|---|---:|---:|" >> "$REPORT"
          FAILED=0
          run_step() {
            NAME="$1"; shift
            OUT="docs/screenshots/${NAME}.log"
            "$@" > "$OUT" 2>&1
            EC=$?
            if [ "$EC" -eq 0 ]; then STATUS="PASS"; else STATUS="FAIL"; FAILED=1; fi
            echo "| ${NAME} | ${STATUS} | ${EC} |" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "## ${NAME} - ${STATUS}" >> "$REPORT"
            echo '```text' >> "$REPORT"
            cat "$OUT" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "" >> "$REPORT"
          }
          if [ -f pyproject.toml ]; then
            run_step pip-upgrade python -m pip install --upgrade pip
            run_step pip-install python -m pip install -e '.[dev]'
          fi
          if [ -d src ] || [ -d tests ] || [ -d dashboard ]; then
            TARGETS=""; [ -d src ] && TARGETS="$TARGETS src"; [ -d tests ] && TARGETS="$TARGETS tests"; [ -d dashboard ] && TARGETS="$TARGETS dashboard"
            run_step compileall python -m compileall -q $TARGETS
          fi
          [ -d tests ] && run_step pytest python -m pytest -q --maxfail=1
          [ -f pyproject.toml ] && run_step ruff python -m ruff check .
          case "$REPO" in
            fraud-mlops-control-tower)
              run_step generate-risk-data python -m fraud_mlops.generate_synthetic_risk_data --output data/synthetic_risk_events.csv --rows 120
              run_step import-check python -c 'import fraud_mlops, fraud_mlops.features, fraud_mlops.api; print("imports-ok")'
              run_step train-small-model python -m fraud_mlops.train --data data/synthetic_risk_events.csv --model artifacts/model.pkl --metrics reports/metrics.json
              ;;
            database-migration-quality-lab)
              run_step generate-legacy-data python -m migration_quality.generate_synthetic_legacy_data --output-dir data --clients 5 --accounts 10
              run_step import-check python -c 'import migration_quality, migration_quality.validate, migration_quality.reconcile; print("imports-ok")'
              ;;
            secure-wealth-rag-assistant)
              run_step import-check python -c 'import secure_rag, secure_rag.rag_pipeline, secure_rag.guardrails; print("imports-ok")'
              run_step rag-demo python -m secure_rag.app "What is the synthetic client risk profile?"
              ;;
            jedha-rncp35288-portfolio)
              for f in README.md PORTFOLIO.md docs/evidence_index.md docs/public_safety_rules.md bloc_1_data_infrastructure/README.md bloc_6_project_governance/README.md; do test -f "$f"; echo "$f $?" >> docs/screenshots/file-checks.log; done
              run_step file-checks cat docs/screenshots/file-checks.log
              ;;
          esac
          python - <<'PY'
          from pathlib import Path
          import html, os
          repo=os.environ['GITHUB_REPOSITORY'].split('/')[-1]
          report=Path('docs/local_run_report.md').read_text(encoding='utf-8', errors='replace')
          lines=[line for line in report.splitlines() if '| ' in line and 'Step' not in line and '---' not in line][:30]
          y=85; nodes=[]
          for line in lines:
              nodes.append(f'<text x="60" y="{y}" class="mono">{html.escape(line[:120])}</text>'); y+=26
          svg=f'''<svg width="1280" height="900" viewBox="0 0 1280 900" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><style>.title{{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:42px;font-weight:750;fill:#fff}}.sub{{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;fill:#9FB3C8}}.mono{{font-family:Consolas,monospace;font-size:18px;fill:#D8E2F0}}</style></defs><rect width="1280" height="900" rx="26" fill="#07111F"/><text x="60" y="52" class="title">{html.escape(repo)}</text><text x="60" y="78" class="sub">Generated from real validation commands in GitHub Actions</text>{''.join(nodes)}</svg>'''
          Path('docs/screenshots/validation-preview.svg').write_text(svg, encoding='utf-8')
          Path('docs/screenshots/validation-output.html').write_text('<!doctype html><meta charset="utf-8"><pre>'+html.escape(report)+'</pre>', encoding='utf-8')
          Path('docs/screenshots.md').write_text('# Screenshots and content previews\n\nGenerated from real repository validation commands in GitHub Actions.\n\n- [validation-preview.svg](screenshots/validation-preview.svg)\n- [validation-output.html](screenshots/validation-output.html)\n', encoding='utf-8')
          PY
          if [ "$FAILED" -ne 0 ]; then touch validation_failed.flag; fi
      - name: Commit generated reports and previews
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/local_run_report.md docs/screenshots.md docs/screenshots || true
          if git diff --cached --quiet; then echo "No generated report changes to commit."; else git commit -m "docs: update generated validation report and previews [skip ci]" && git push; fi
      - name: Fail if validation failed
        shell: bash
        run: |
          if [ -f validation_failed.flag ]; then cat validation_failed.flag; exit 1; fi
